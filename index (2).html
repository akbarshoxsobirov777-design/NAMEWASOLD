<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday 🎂</title>
<style>
/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════════
   TOKENS  (warm gold envelope · coral-pink bg)
═══════════════════════════════════════════ */
:root{
  --bg-top:    #f7a8b8;
  --bg-bot:    #f28090;
  --env-face:  #e8c96a;
  --env-shade: #d4a83a;
  --env-light: #f5df96;
  --env-inner: #dbb84e;
  --heart:     #e8253a;
  --paper:     #fffdf8;
  --paper-line:#f0e8d5;
  --text-head: #c0284a;
  --text-body: #5a3040;
  --shadow:    rgba(160,60,40,.25);
}

/* ═══════════════════════════════════════════
   BODY / BACKGROUND
═══════════════════════════════════════════ */
body{
  min-height:100vh;
  background:linear-gradient(160deg,var(--bg-top) 0%,var(--bg-bot) 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  font-family:'Georgia',serif;
  position:relative;
}

/* ═══════════════════════════════════════════
   FLOATING RED HEARTS  (CSS, no canvas)
═══════════════════════════════════════════ */
.fheart{
  position:fixed;
  bottom:-60px;
  color:var(--heart);
  font-size:1.5rem;
  opacity:0;
  pointer-events:none;
  user-select:none;
  animation:fhRise linear infinite;
  filter:drop-shadow(0 2px 4px rgba(220,30,50,.35));
}
@keyframes fhRise{
  0%  {transform:translateY(0) rotate(-8deg); opacity:0}
  8%  {opacity:.9}
  92% {opacity:.7}
  100%{transform:translateY(-110vh) rotate(12deg); opacity:0}
}

/* Scatter hearts behind & around envelope */
.scatter-heart{
  position:fixed;
  color:var(--heart);
  pointer-events:none;
  user-select:none;
  animation:scatter linear infinite;
  filter:drop-shadow(0 2px 5px rgba(220,30,50,.3));
}
@keyframes scatter{
  0%,100%{transform:translateY(0) scale(1)}
  50%    {transform:translateY(-18px) scale(1.08)}
}

/* ═══════════════════════════════════════════
   SCENE  (zoom on open)
═══════════════════════════════════════════ */
.scene{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:transform .9s cubic-bezier(.25,.46,.45,.94);
}
.scene.zoomed{transform:scale(1.07)}

/* ═══════════════════════════════════════════
   ENVELOPE WRAPPER
═══════════════════════════════════════════ */
.env-wrap{
  position:relative;
  width:300px;
  height:220px;
  cursor:pointer;
  animation:envBob 3.2s ease-in-out infinite;
  /* perspective for flap 3-D */
  perspective:900px;
}
.env-wrap.opened{animation:none;cursor:default}

@keyframes envBob{
  0%,100%{transform:translateY(0)}
  50%    {transform:translateY(-13px)}
}

/* ── envelope body (base layer) ── */
.env-body{
  position:absolute;
  inset:0;
  background:linear-gradient(175deg,var(--env-light) 0%,var(--env-face) 60%,var(--env-shade) 100%);
  border-radius:6px;
  box-shadow:
    0 12px 40px var(--shadow),
    inset 0 1px 0 rgba(255,255,255,.45);
  z-index:1;
}

/* left triangle */
.env-left{
  position:absolute;
  top:0;left:0;bottom:0;
  width:155px;
  background:linear-gradient(140deg,var(--env-shade) 0%,var(--env-face) 100%);
  clip-path:polygon(0 0,100% 50%,0 100%);
  z-index:4; /* covers letter sides */
}
/* right triangle */
.env-right{
  position:absolute;
  top:0;right:0;bottom:0;
  width:155px;
  background:linear-gradient(220deg,var(--env-shade) 0%,var(--env-face) 100%);
  clip-path:polygon(100% 0,0 50%,100% 100%);
  z-index:4; /* covers letter sides */
}
/* bottom triangle */
.env-btm{
  position:absolute;
  bottom:0;left:0;right:0;
  height:115px;
  overflow:hidden;
  z-index:4; /* covers letter bottom */
}
.env-btm::before{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:115px;
  background:linear-gradient(175deg,var(--env-face) 0%,var(--env-inner) 100%);
  clip-path:polygon(0 100%,50% 0,100% 100%);
}

/* ── top flap (opens with 3-D flip) ── */
.env-flap{
  position:absolute;
  top:0;left:0;right:0;
  height:115px;
  transform-origin:top center;
  transform-style:preserve-3d;
  transition:transform .75s cubic-bezier(.4,0,.2,1);
  z-index:8; /* above everything incl. letter */
  border-radius:6px 6px 0 0;
}
/* front face of flap */
.env-flap::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(170deg,var(--env-light) 0%,var(--env-face) 100%);
  clip-path:polygon(0 0,50% 100%,100% 0);
  border-radius:6px 6px 0 0;
}
/* open = flip back behind everything */
.env-wrap.opened .env-flap{
  transform:rotateX(-180deg);
  z-index:0;
}

/* ── wax seal ── */
.env-seal{
  position:absolute;
  top:52px;left:50%;
  transform:translateX(-50%);
  font-size:2rem;
  z-index:9;
  filter:drop-shadow(0 2px 5px rgba(180,30,50,.4));
  transition:opacity .35s .1s;
  pointer-events:none;
}
.env-wrap.opened .env-seal{opacity:0}

/* ═══════════════════════════════════════════
   LETTER  (slides up from envelope)
═══════════════════════════════════════════ */
.letter{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%) translateY(0px);
  width:258px;
  background:var(--paper);
  border-radius:14px;
  padding:24px 20px 20px;
  box-shadow:
    0 4px 28px rgba(160,80,40,.18),
    inset 0 1px 0 rgba(255,255,255,.95);
  /* tucked behind envelope sides (z:4) while closed */
  z-index:2;
  opacity:0;
  pointer-events:none;
  transition:
    opacity .65s ease .45s,
    transform .9s cubic-bezier(.22,1,.36,1) .3s;
}
/* once opened, lift above envelope pieces */
.letter.visible{
  z-index:6;
  pointer-events:auto;
}

/* faint ruled lines */
.letter::before{
  content:'';
  position:absolute;
  top:52px;left:12px;right:12px;bottom:12px;
  background:repeating-linear-gradient(
    to bottom,
    transparent,transparent 26px,
    var(--paper-line) 26px,var(--paper-line) 27px
  );
  pointer-events:none;
  border-radius:0 0 10px 10px;
}

.letter.visible{
  opacity:1;
  transform:translateX(-50%) translateY(-195px);
  animation:letterBob 4s ease-in-out infinite 1.3s;
}

@keyframes letterBob{
  0%,100%{transform:translateX(-50%) translateY(-195px)}
  50%    {transform:translateX(-50%) translateY(-205px)}
}

/* ── letter text ── */
.ltr-age{
  font-family:'Georgia',serif;
  font-size:2rem;
  color:var(--text-head);
  text-align:center;
  line-height:1.1;
  margin-bottom:4px;
  font-style:italic;
}
.ltr-title{
  font-family:'Georgia',serif;
  font-size:1.3rem;
  color:var(--text-head);
  text-align:center;
  font-style:italic;
  margin-bottom:12px;
}
.ltr-divider{
  width:44px;height:2px;
  background:linear-gradient(90deg,transparent,#e8a0a8,transparent);
  margin:0 auto 12px;border-radius:2px;
}
.ltr-body{
  font-size:.85rem;
  color:var(--text-body);
  text-align:center;
  line-height:1.75;
  font-family:'Georgia',serif;
  position:relative;z-index:1;
}
.ltr-sign{
  margin-top:12px;
  text-align:center;
  font-style:italic;
  color:var(--text-head);
  font-size:1rem;
}

/* ── cute bear illustration (pure SVG inline) ── */
.ltr-bears{
  display:block;
  margin:10px auto 4px;
  width:110px;
  position:relative;z-index:1;
}

/* ── sparkles on letter ── */
.sparkle{
  position:absolute;
  border-radius:50%;
  background:#fff;
  opacity:0;
  pointer-events:none;
  box-shadow:0 0 6px 2px rgba(232,120,80,.6);
}

/* ═══════════════════════════════════════════
   BURST HEARTS
═══════════════════════════════════════════ */
.bheart{
  position:fixed;
  font-size:1.3rem;
  pointer-events:none;
  z-index:200;
  color:var(--heart);
}

/* ═══════════════════════════════════════════
   OPEN-ME LABEL
═══════════════════════════════════════════ */
.open-label{
  margin-top:20px;
  font-size:1rem;
  color:#fff;
  letter-spacing:.06em;
  font-style:italic;
  text-shadow:0 2px 8px rgba(160,40,60,.35);
  transition:opacity .4s;
}
.open-label.gone{opacity:0;pointer-events:none}

/* ═══════════════════════════════════════════
   CONFETTI CANVAS
═══════════════════════════════════════════ */
#ccanvas{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:100;
}

/* ═══════════════════════════════════════════
   CONTROL BUTTONS
═══════════════════════════════════════════ */
.controls{
  position:fixed;bottom:20px;right:20px;
  display:flex;gap:10px;z-index:50;
}
.ctrl{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(232,37,58,.3);
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(8px);
  cursor:pointer;
  font-size:1.15rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;
  box-shadow:0 2px 10px rgba(160,40,60,.15);
  color:#c0284a;
}
.ctrl:hover{background:rgba(255,255,255,.85);transform:scale(1.1)}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:380px){
  .env-wrap{width:260px;height:190px}
  .letter{width:224px;padding:20px 16px 16px}
  .ltr-age{font-size:1.7rem}
  .ltr-title{font-size:1.1rem}
  .letter.visible{transform:translateX(-50%) translateY(-170px)}
  @keyframes letterBob{
    0%,100%{transform:translateX(-50%) translateY(-170px)}
    50%    {transform:translateX(-50%) translateY(-178px)}
  }
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<canvas id="ccanvas"></canvas>

<!-- ── Scene ── -->
<div class="scene" id="scene">

  <!-- Envelope -->
  <div class="env-wrap" id="envelope" role="button" tabindex="0" aria-label="Open birthday letter">

    <div class="env-body"></div>
    <div class="env-left"></div>
    <div class="env-right"></div>
    <div class="env-btm"></div>

    <!-- Letter (inside) -->
    <div class="letter" id="letter">
      <div class="ltr-age">20! 🎂</div>
      <div class="ltr-title">Happy Birthday!</div>
      <div class="ltr-divider"></div>

      <!-- Cute bear + bunny SVG (hand-drawn style, self-contained) -->
      <svg class="ltr-bears" viewBox="0 0 110 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- BUNNY (left, white) -->
        <!-- body -->
        <ellipse cx="32" cy="56" rx="16" ry="19" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>
        <!-- head -->
        <circle cx="32" cy="35" r="13" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>
        <!-- ears -->
        <ellipse cx="25" cy="20" rx="4" ry="10" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>
        <ellipse cx="25" cy="20" rx="2" ry="7" fill="#ffc0cb"/>
        <ellipse cx="39" cy="20" rx="4" ry="10" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>
        <ellipse cx="39" cy="20" rx="2" ry="7" fill="#ffc0cb"/>
        <!-- face -->
        <circle cx="28.5" cy="34" r="2" fill="#333"/>
        <circle cx="35.5" cy="34" r="2" fill="#333"/>
        <path d="M30 39 Q32 41.5 34 39" stroke="#e08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse cx="32" cy="38" rx="2.5" ry="1.5" fill="#ffc0cb" opacity=".6"/>
        <!-- arms -->
        <ellipse cx="17" cy="56" rx="5" ry="9" fill="#f5f5f5" stroke="#ddd" stroke-width=".8" transform="rotate(-15 17 56)"/>
        <ellipse cx="47" cy="56" rx="5" ry="9" fill="#f5f5f5" stroke="#ddd" stroke-width=".8" transform="rotate(15 47 56)"/>
        <!-- feet -->
        <ellipse cx="26" cy="74" rx="7" ry="4" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>
        <ellipse cx="38" cy="74" rx="7" ry="4" fill="#f5f5f5" stroke="#ddd" stroke-width=".8"/>

        <!-- BEAR (right, brown) -->
        <!-- body -->
        <ellipse cx="78" cy="56" rx="17" ry="19" fill="#c8832a" stroke="#a0600a" stroke-width=".8"/>
        <!-- head -->
        <circle cx="78" cy="34" r="14" fill="#c8832a" stroke="#a0600a" stroke-width=".8"/>
        <!-- ears -->
        <circle cx="68" cy="22" r="6" fill="#c8832a" stroke="#a0600a" stroke-width=".8"/>
        <circle cx="68" cy="22" r="3.5" fill="#e8a060"/>
        <circle cx="88" cy="22" r="6" fill="#c8832a" stroke="#a0600a" stroke-width=".8"/>
        <circle cx="88" cy="22" r="3.5" fill="#e8a060"/>
        <!-- snout -->
        <ellipse cx="78" cy="39" rx="7" ry="5" fill="#e8a060"/>
        <!-- face -->
        <circle cx="73.5" cy="33" r="2.2" fill="#333"/>
        <circle cx="82.5" cy="33" r="2.2" fill="#333"/>
        <!-- smile -->
        <path d="M74 40.5 Q78 44 82 40.5" stroke="#a0600a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <!-- blush -->
        <ellipse cx="69" cy="38" rx="3" ry="2" fill="#f4a0a0" opacity=".55"/>
        <ellipse cx="87" cy="38" rx="3" ry="2" fill="#f4a0a0" opacity=".55"/>
        <!-- arms -->
        <ellipse cx="62" cy="57" rx="5.5" ry="9.5" fill="#c8832a" stroke="#a0600a" stroke-width=".8" transform="rotate(-18 62 57)"/>
        <ellipse cx="94" cy="57" rx="5.5" ry="9.5" fill="#c8832a" stroke="#a0600a" stroke-width=".8" transform="rotate(18 94 57)"/>
        <!-- feet -->
        <ellipse cx="71" cy="74" rx="8" ry="4.5" fill="#a0600a"/>
        <ellipse cx="85" cy="74" rx="8" ry="4.5" fill="#a0600a"/>

        <!-- TINY RED HEART between them -->
        <text x="52" y="54" font-size="11" text-anchor="middle" fill="#e8253a">❤</text>
      </svg>

      <div class="ltr-body">
        Wishing you all the best in your life.<br>
        You are one in a million. 💌
      </div>
      <div class="ltr-sign">Love you ❤️</div>
    </div><!-- /letter -->

    <div class="env-flap" id="flap"></div>
    <div class="env-seal" id="seal">❤️</div>

  </div><!-- /env-wrap -->

  <div class="open-label" id="open-label">Open me ❤️</div>
</div><!-- /scene -->

<!-- Controls -->
<div class="controls">
  <button class="ctrl" id="music-btn" aria-label="Toggle music" title="Music">🔇</button>
  <button class="ctrl" id="replay-btn" aria-label="Replay" title="Replay">🔄</button>
</div>

<audio id="bgm" loop preload="none"></audio>

<script>
/* ═══════════════════════════════════════════════
   1. SCATTER HEARTS  (fixed around the scene)
═══════════════════════════════════════════════ */
(function(){
  const positions=[
    {left:'8%', top:'15%',size:'2.2rem',dur:'3.8s',delay:'0s'},
    {left:'80%',top:'10%',size:'1.8rem',dur:'4.2s',delay:'0.5s'},
    {left:'5%', top:'60%',size:'2rem', dur:'3.5s',delay:'1s'},
    {left:'85%',top:'55%',size:'2.4rem',dur:'4s',  delay:'0.3s'},
    {left:'15%',top:'82%',size:'1.6rem',dur:'3.9s',delay:'0.7s'},
    {left:'75%',top:'80%',size:'2rem', dur:'4.4s',delay:'0.2s'},
    {left:'42%',top:'6%', size:'1.5rem',dur:'3.6s',delay:'1.2s'},
    {left:'60%',top:'88%',size:'1.9rem',dur:'4.1s',delay:'0.9s'},
  ];
  positions.forEach(p=>{
    const el=document.createElement('span');
    el.className='scatter-heart';
    el.textContent='❤';
    el.style.cssText=`left:${p.left};top:${p.top};font-size:${p.size};
      animation-duration:${p.dur};animation-delay:${p.delay};
      filter:drop-shadow(0 3px 6px rgba(220,30,50,.35))`;
    document.body.appendChild(el);
  });
})();

/* ═══════════════════════════════════════════════
   2. FLOATING RISING HEARTS
═══════════════════════════════════════════════ */
(function(){
  function makeHeart(){
    const h=document.createElement('span');
    h.className='fheart';
    h.textContent='❤';
    const left=Math.random()*100;
    const size=0.9+Math.random()*1.4;
    const dur=7+Math.random()*9;
    const delay=Math.random()*4;
    h.style.cssText=`left:${left}vw;font-size:${size}rem;
      animation-duration:${dur}s;animation-delay:${delay}s;`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),(dur+delay)*1000);
  }
  for(let i=0;i<14;i++) makeHeart();
  setInterval(makeHeart, 900);
})();

/* ═══════════════════════════════════════════════
   3. SPARKLES ON LETTER
═══════════════════════════════════════════════ */
function attachSparkles(){
  const letter=document.getElementById('letter');
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    const size=4+Math.random()*6;
    const ang=(i/10)*360;
    const r=48+Math.random()*22;
    const x=50+Math.cos(ang*Math.PI/180)*r/2.6;
    const y=50+Math.sin(ang*Math.PI/180)*r/2.6;
    s.style.cssText=`width:${size}px;height:${size}px;left:${x}%;top:${y}%`;
    letter.appendChild(s);
  }
}
attachSparkles();

function animateSparkles(){
  const sparkles=document.querySelectorAll('.sparkle');
  const cols=['#e8253a','#ffb3c6','#fff','#f7d080','#ff85a1'];
  sparkles.forEach((s,i)=>{
    (function loop(){
      const delay=i*140+Math.random()*200;
      setTimeout(()=>{
        s.style.transition='opacity .35s,transform .35s,box-shadow .35s';
        s.style.opacity='1';
        s.style.background=cols[Math.floor(Math.random()*cols.length)];
        s.style.boxShadow=`0 0 10px 3px ${cols[Math.floor(Math.random()*cols.length)]}`;
        s.style.transform=`scale(${1.3+Math.random()*0.8})`;
        setTimeout(()=>{
          s.style.opacity='0.15';
          s.style.transform='scale(.5)';
          setTimeout(loop, 400+Math.random()*800);
        },450);
      },delay);
    })();
  });
}

/* ═══════════════════════════════════════════════
   4. ENVELOPE OPEN LOGIC
═══════════════════════════════════════════════ */
(function(){
  const env   = document.getElementById('envelope');
  const label = document.getElementById('open-label');
  const letter= document.getElementById('letter');
  const scene = document.getElementById('scene');
  let opened  = false;

  function open(){
    if(opened) return;
    opened=true;
    env.classList.add('opened');
    scene.classList.add('zoomed');
    label.classList.add('gone');

    // heart burst from envelope centre
    const r=env.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 22);

    setTimeout(()=>{
      letter.classList.add('visible');
      animateSparkles();
    }, 620);

    setTimeout(fireConfetti, 950);
  }

  env.addEventListener('click', open);
  env.addEventListener('keydown', e=>{
    if(e.key==='Enter'||e.key===' ') open();
  });

  window._replay=function(){
    opened=false;
    env.classList.remove('opened');
    scene.classList.remove('zoomed');
    label.classList.remove('gone');
    letter.classList.remove('visible');
    stopConfetti();
  };
})();

/* ═══════════════════════════════════════════════
   5. BURST HEARTS on click
═══════════════════════════════════════════════ */
function burst(cx,cy,n){
  for(let i=0;i<n;i++){
    const el=document.createElement('span');
    el.className='bheart';
    el.textContent='❤';
    const ang=(i/n)*Math.PI*2;
    const dist=55+Math.random()*100;
    const tx=Math.cos(ang)*dist;
    const ty=Math.sin(ang)*dist;
    el.style.cssText=`left:${cx}px;top:${cy}px;`;
    document.body.appendChild(el);
    el.animate([
      {transform:'translate(-50%,-50%) scale(.3)',opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(${.7+Math.random()*.6})`,opacity:0}
    ],{duration:800+Math.random()*500,easing:'cubic-bezier(.22,1,.36,1)',
       fill:'forwards',delay:Math.random()*180});
    setTimeout(()=>el.remove(), 1600);
  }
}

/* ═══════════════════════════════════════════════
   6. CONFETTI
═══════════════════════════════════════════════ */
let confActive=false, confRAF;
const ccanvas=document.getElementById('ccanvas');
const cctx=ccanvas.getContext('2d');

function resizeConf(){
  ccanvas.width=window.innerWidth;
  ccanvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeConf);
resizeConf();

function fireConfetti(){
  const palette=['#e8253a','#ffb3c6','#d4a83a','#f7d080','#c0284a','#fff','#f9a8c9'];
  const pieces=[];
  for(let i=0;i<150;i++){
    pieces.push({
      x:Math.random()*ccanvas.width,
      y:-20-Math.random()*ccanvas.height,
      w:6+Math.random()*9, h:8+Math.random()*14,
      color:palette[Math.floor(Math.random()*palette.length)],
      vx:(Math.random()-.5)*2.2,
      vy:2.2+Math.random()*3,
      ang:Math.random()*Math.PI*2,
      spin:(Math.random()-.5)*.14,
      shape:Math.random()<.35?'circle':Math.random()<.5?'heart':'rect',
      alpha:.9+Math.random()*.1,
    });
  }
  confActive=true;
  let tick=0;
  const maxTick=230;

  function drawHeart(x,y,r){
    cctx.beginPath();
    cctx.moveTo(x,y+r*.3);
    cctx.bezierCurveTo(x,y,x-r,y,x-r,y+r*.4);
    cctx.bezierCurveTo(x-r,y+r*.85,x,y+r*1.1,x,y+r*1.35);
    cctx.bezierCurveTo(x,y+r*1.1,x+r,y+r*.85,x+r,y+r*.4);
    cctx.bezierCurveTo(x+r,y,x,y,x,y+r*.3);
    cctx.closePath();cctx.fill();
  }

  function frame(){
    if(!confActive){cctx.clearRect(0,0,ccanvas.width,ccanvas.height);return;}
    cctx.clearRect(0,0,ccanvas.width,ccanvas.height);
    tick++;
    const fade=tick>maxTick*.7? 1-(tick-maxTick*.7)/(maxTick*.3):1;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.ang+=p.spin; p.vy+=.045;
      if(p.x<-20) p.x=ccanvas.width+20;
      if(p.x>ccanvas.width+20) p.x=-20;
      cctx.save();
      cctx.globalAlpha=Math.max(0,p.alpha*fade);
      cctx.fillStyle=p.color;
      cctx.translate(p.x,p.y); cctx.rotate(p.ang);
      if(p.shape==='circle'){
        cctx.beginPath();cctx.arc(0,0,p.w/2,0,Math.PI*2);cctx.fill();
      } else if(p.shape==='heart'){
        drawHeart(0,-p.h*.5,p.w*.4);
      } else {
        cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
      cctx.restore();
    });
    if(tick<maxTick) confRAF=requestAnimationFrame(frame);
    else{cctx.clearRect(0,0,ccanvas.width,ccanvas.height);confActive=false;}
  }
  confRAF=requestAnimationFrame(frame);
}

function stopConfetti(){
  confActive=false;
  cancelAnimationFrame(confRAF);
  cctx.clearRect(0,0,ccanvas.width,ccanvas.height);
}

/* ═══════════════════════════════════════════════
   7. CONTROLS
═══════════════════════════════════════════════ */
(function(){
  const mbtn=document.getElementById('music-btn');
  const audio=document.getElementById('bgm');
  let on=false;
  mbtn.addEventListener('click',()=>{
    if(!audio.src||audio.src===location.href){
      mbtn.textContent='🎵'; setTimeout(()=>mbtn.textContent='🔇',1200); return;
    }
    if(on){audio.pause();mbtn.textContent='🔇';on=false;}
    else{audio.volume=.4;audio.play().catch(()=>{});mbtn.textContent='🔊';on=true;}
  });
  document.getElementById('replay-btn').addEventListener('click',()=>window._replay());
})();
</script>
